name: Release Build

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release-build-${{ github.event.release.id }}
  cancel-in-progress: false

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Prepare Android signing files
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail

          for secret_name in KEYSTORE_BASE64 KEYSTORE_PASSWORD KEY_ALIAS KEY_PASSWORD; do
            if [ -z "${!secret_name:-}" ]; then
              echo "Missing required secret: ${secret_name}" >&2
              exit 1
            fi
          done

          echo "$KEYSTORE_BASE64" | base64 --decode > android/upload-keystore.jks

          printf '%s\n' \
            'storeFile=upload-keystore.jks' \
            "storePassword=${KEYSTORE_PASSWORD}" \
            "keyAlias=${KEY_ALIAS}" \
            "keyPassword=${KEY_PASSWORD}" \
            > android/key.properties

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Read app version
        id: app_version
        shell: bash
        run: |
          set -euo pipefail
          app_version="$(grep '^version:' pubspec.yaml | head -n 1 | cut -d ' ' -f 2)"
          if [ -z "$app_version" ]; then
            echo "Failed to read version from pubspec.yaml" >&2
            exit 1
          fi
          echo "value=$app_version" >> "$GITHUB_OUTPUT"

      - name: Build Android APK
        run: flutter build apk --release

      - name: Rename Android artifact
        shell: bash
        run: |
          artifact_name="Resonance-android-${{ steps.app_version.outputs.value }}-${{ github.event.release.tag_name }}.apk"
          cp build/app/outputs/flutter-apk/app-release.apk "$artifact_name"
          echo "ANDROID_ARTIFACT_NAME=$artifact_name" >> "$GITHUB_ENV"

      - name: Upload Android artifact to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ANDROID_ARTIFACT_NAME }}

  build-windows:
    name: Build Windows Package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Read app version
        id: app_version
        shell: pwsh
        run: |
          $versionLine = Select-String -Path "pubspec.yaml" -Pattern "^version:\s*(.+)$" | Select-Object -First 1
          if (-not $versionLine) {
            throw "Failed to read version from pubspec.yaml"
          }
          $appVersion = $versionLine.Matches[0].Groups[1].Value.Trim()
          "value=$appVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Build Windows
        run: flutter build windows --release

      - name: Package Windows output
        shell: pwsh
        run: |
          $tag = "${{ github.event.release.tag_name }}"
          $appVersion = "${{ steps.app_version.outputs.value }}"
          $packageName = "Resonance-windows-$appVersion-$tag"
          $packageDir = Join-Path $env:RUNNER_TEMP $packageName

          New-Item -ItemType Directory -Path $packageDir -Force | Out-Null
          Copy-Item -Path "build\windows\x64\runner\Release\*" -Destination $packageDir -Recurse -Force

          Compress-Archive -Path $packageDir -DestinationPath "$packageName.zip" -Force
          "WINDOWS_ARTIFACT_NAME=$packageName.zip" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Upload Windows artifact to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.WINDOWS_ARTIFACT_NAME }}
