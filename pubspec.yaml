name: rsstool
description: Resonance is a local-first RSS reader built with Flutter.
publish_to: none
version: 0.5.0+8

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_widget_from_html_core: ^0.17.2
  http: ^1.6.0
  path_provider: ^2.1.5
  url_launcher: ^6.3.2
  window_manager: ^0.5.1
  xml: ^6.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
